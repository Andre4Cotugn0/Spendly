name: moneyra
description: "Moneyra - Traccia spese, abbonamenti e budget con AI insights"
publish_to: 'none'

version: 0.1.1-alpha+2

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # Database SQLite locale
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Grafici statistiche
  fl_chart: ^0.68.0

  # Widget home screen Android
  home_widget: ^0.6.0

  # State management
  provider: ^6.1.2

  # UI/UX
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utilità
  intl: ^0.19.0
  uuid: ^4.4.0

  # Notifiche locali
  flutter_local_notifications: ^20.0.0
  timezone: ^0.10.0

  # Export & Sharing
  share_plus: ^10.0.0
  csv: ^6.0.0

  # Preferenze locali (onboarding, settings)
  shared_preferences: ^2.3.0

  # URL launcher (crediti / link esterni)
  url_launcher: ^6.3.0

  # Info app (versione, build number)
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "assets/icon/icon_adaptive_bg.png"
  adaptive_icon_foreground: "assets/icon/icon_white.png"
  remove_alpha_ios: true
  ios_content_mode: "scaleAspectFill"

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#FFFFFF"
  web: false
  android_12:
    color: "#FFFFFF"
    color_dark: "#FFFFFF"
    image: assets/icon/icon-no-bg.png
    image_dark: assets/icon/icon-no-bg.png
    icon_background_color: "#FFFFFF"
    icon_background_color_dark: "#FFFFFF"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/icon/
